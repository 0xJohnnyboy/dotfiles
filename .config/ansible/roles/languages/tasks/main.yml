---
# =============================================================================
# Programming Languages Installation
# =============================================================================

# =============================================================================
# Go Installation
# =============================================================================
- name: Install Go via Homebrew (macOS)
  homebrew:
    name: go
    state: present
  when: ansible_os_family == "Darwin"
  become: false

- name: Check if Go is already installed (Linux)
  command: go version
  register: go_installed
  failed_when: false
  changed_when: false
  when: ansible_os_family != "Darwin"

- name: Download Go (Linux)
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.{{ ansible_system | lower }}-{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}.tar.gz"
    dest: "/tmp/go{{ go_version }}.tar.gz"
  when: ansible_os_family != "Darwin" and go_installed.rc != 0

- name: Remove old Go installation (Linux)
  file:
    path: /usr/local/go
    state: absent
  become: true
  when: ansible_os_family != "Darwin" and go_installed.rc != 0

- name: Extract Go (Linux)
  unarchive:
    src: "/tmp/go{{ go_version }}.tar.gz"
    dest: /usr/local
    remote_src: yes
  become: true
  when: ansible_os_family != "Darwin" and go_installed.rc != 0

- name: Ensure GOPATH bin directory exists
  file:
    path: "{{ ansible_user_dir }}/go/bin"
    state: directory
    mode: '0755'

- name: Install Go developer tools
  command: "go install {{ item }}"
  loop:
    - golang.org/x/tools/gopls@latest
    - github.com/go-delve/delve/cmd/dlv@latest
    - gotest.tools/gotestsum@latest
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/go/bin:{{ ansible_env.PATH }}"
    GOPATH: "{{ ansible_user_dir }}/go"
  ignore_errors: yes

# =============================================================================
# Node.js Installation
# =============================================================================
- name: Install Node.js and pnpm via Homebrew (macOS)
  homebrew:
    name:
      - gemini-cli
      - node
      - pnpm
    state: present
  when: ansible_os_family == "Darwin"
  become: false

- name: Check if nvm is installed (Linux)
  stat:
    path: "{{ ansible_user_dir }}/.nvm/nvm.sh"
  register: nvm_installed
  when: ansible_os_family != "Darwin"

- name: Download nvm installer (Linux)
  get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh
    dest: /tmp/nvm_install.sh
    mode: '0755'
  when: ansible_os_family != "Darwin" and not nvm_installed.stat.exists

- name: Install nvm (Linux)
  shell: bash /tmp/nvm_install.sh
  when: ansible_os_family != "Darwin" and not nvm_installed.stat.exists

- name: Install Node.js LTS via nvm (Linux)
  shell: |
    export NVM_DIR="{{ ansible_user_dir }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install {{ node_lts_version }}
    nvm alias default {{ node_lts_version }}
    nvm use {{ node_lts_version }}
  args:
    executable: /bin/bash
  when: ansible_os_family != "Darwin"

- name: Install global npm developer tools (macOS)
  command: "npm install -g {{ item }}"
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/opt/node/bin:{{ ansible_env.PATH }}"
  loop:
    - typescript
    - typescript-language-server
    - "@angular/language-server"
    - "@astrojs/language-server"
    - vscode-langservers-extracted
    - "@anthropic-ai/claude-code"
    - "@mistweaverco/kulala-ls"
    - "tree-sitter-cli@{{ tree_sitter_cli_version }}"
  ignore_errors: yes
  when: ansible_os_family == "Darwin"

- name: Install global npm developer tools (Linux)
  shell: |
    export NVM_DIR="{{ ansible_user_dir }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm use {{ node_lts_version }}
    npm install -g \
      typescript \
      typescript-language-server \
      @angular/language-server \
      @astrojs/language-server \
      vscode-langservers-extracted \
      @anthropic-ai/claude-code \
      @google/gemini-cli \
      @mistweaverco/kulala-ls \
      tree-sitter-cli@{{ tree_sitter_cli_version }} \
      pnpm \
      corepack
  args:
    executable: /bin/bash
  ignore_errors: yes
  when: ansible_os_family != "Darwin"

# =============================================================================
# Rust Installation (via rustup)
# =============================================================================
- name: Check if rustup is installed
  command: rustup --version
  register: rustup_installed
  failed_when: false
  changed_when: false

- name: Download rustup installer
  get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup.sh
    mode: '0755'
  when: rustup_installed.rc != 0

- name: Install Rust via rustup
  shell: sh /tmp/rustup.sh -y --default-toolchain {{ rust_version }}
  when: rustup_installed.rc != 0

- name: Install rust-analyzer
  shell: |
    source {{ ansible_user_dir }}/.cargo/env
    rustup component add rust-analyzer
  args:
    executable: /bin/bash
  when: rustup_installed.rc != 0
  ignore_errors: yes

# =============================================================================
# Lua Language Server
# =============================================================================
- name: Install lua-language-server (macOS)
  homebrew:
    name: lua-language-server
    state: present
  when: ansible_os_family == "Darwin"
  become: false

- name: Set LuaLS architecture (Linux)
  set_fact:
    lualls_arch: "{{ 'x64' if ansible_architecture in ['x86_64', 'amd64'] else 'arm64' }}"
  when: ansible_os_family != "Darwin"

- name: Fetch latest LuaLS release metadata (Linux)
  uri:
    url: https://api.github.com/repos/LuaLS/lua-language-server/releases/latest
    return_content: true
  register: lualls_release
  when: ansible_os_family != "Darwin"

- name: Set LuaLS version (Linux)
  set_fact:
    lualls_version: "{{ lualls_release.json.tag_name }}"
  when: ansible_os_family != "Darwin"

- name: Ensure LuaLS directories exist (Linux)
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_user_dir }}/.local/bin"
    - "{{ ansible_user_dir }}/.local/opt"
  when: ansible_os_family != "Darwin"

- name: Remove previous LuaLS install directory (Linux)
  file:
    path: "{{ ansible_user_dir }}/.local/opt/lua-language-server-{{ lualls_version }}"
    state: absent
  when: ansible_os_family != "Darwin"

- name: Create LuaLS install directory (Linux)
  file:
    path: "{{ ansible_user_dir }}/.local/opt/lua-language-server-{{ lualls_version }}"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Darwin"

- name: Download LuaLS release archive (Linux)
  get_url:
    url: "https://github.com/LuaLS/lua-language-server/releases/download/{{ lualls_version }}/lua-language-server-{{ lualls_version }}-linux-{{ lualls_arch }}.tar.gz"
    dest: "/tmp/lua-language-server-{{ lualls_version }}-linux-{{ lualls_arch }}.tar.gz"
    mode: '0644'
  when: ansible_os_family != "Darwin"

- name: Extract LuaLS archive (Linux)
  unarchive:
    src: "/tmp/lua-language-server-{{ lualls_version }}-linux-{{ lualls_arch }}.tar.gz"
    dest: "{{ ansible_user_dir }}/.local/opt/lua-language-server-{{ lualls_version }}"
    remote_src: true
  when: ansible_os_family != "Darwin"

- name: Link lua-language-server binary (Linux)
  file:
    src: "{{ ansible_user_dir }}/.local/opt/lua-language-server-{{ lualls_version }}/bin/lua-language-server"
    dest: "{{ ansible_user_dir }}/.local/bin/lua-language-server"
    state: link
    force: true
  when: ansible_os_family != "Darwin"

- name: Display languages installation status
  debug:
    msg: |
      Programming languages installed successfully!

      Go {{ go_version }}:
        - gopls
        - delve
        - gotestsum

      Node.js {{ node_lts_version }}:
        - typescript
        - typescript-language-server
        - @angular/language-server
        - @astrojs/language-server
        - vscode-eslint-language-server
        - @anthropic-ai/claude-code
        - @mistweaverco/kulala-ls
        - tree-sitter-cli@{{ tree_sitter_cli_version }}
        - @google/gemini-cli (Homebrew on macOS, npm on Linux)
        - pnpm (Homebrew on macOS, npm on Linux)
        - corepack (npm on Linux)

      Rust {{ rust_version }} (via rustup):
        - rustup installed to ~/.cargo
        - rust-analyzer

      Lua:
        - lua-language-server

      Add to PATH in your shell config:
        export PATH="/opt/homebrew/opt/node/bin:$PATH"
        export PATH="$HOME/.cargo/bin:$PATH"
        export PATH="$HOME/.local/bin:$PATH"
        export PATH="$HOME/go/bin:$PATH"

      Verify installations:
        go version
        node --version
        gopls version
        typescript-language-server --version
        cargo --version
