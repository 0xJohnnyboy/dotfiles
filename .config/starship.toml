# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
format = '''
🧂 $directory $git_branch $fill $git_state $git_status $nodejs $lua $docker_context $memory_usage
$character
'''
add_newline = true

[fill]
symbol = ' '

[character]
success_symbol = '[→](bold blue) '
error_symbol = '[✗](bold red) '

[username]
style_user = 'blue bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = true

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'

[git_status]
conflicted = '🏳'
ahead = '⬆️ ${count} '
behind = '⬇️ ${count} '
diverged = '↕️ ⬆️ {ahead_count} ⬇️ ${behind_count} '
up_to_date = '✓ '
untracked = '🤷 '
stashed = '📦 '
modified = '✏️ '
staged = '[++\($count\)](green) '
renamed = '💱 '
deleted = '🗑 '

[memory_usage]
disabled = false
threshold = 80
symbol = '🧠 '
style = 'bold black bg:dimmed bg:red'
# format = ' [ $symbol RAM:${ram_pct} | SWAP: ${swap_pct} ]($style) '
# format = 'via $symbol [${ram}( \| ${swap})]($style) '

[docker_context]
format = '[ 🐋 $context ](blue bold)'

[nodejs]
format = '[ $symbol($version )]($style)' 

[lua]
format = '[ $symbol($version )]($style)'

[golang]
format = 'via [$symbol($version )($mod_version )]($style)'
